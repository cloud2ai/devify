services:
  devify-api:
    image: devify:latest
    container_name: devify-api-dev
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_MIRROR: ${USE_MIRROR:-true}
        DEV_MODE: "1"
    env_file:
      - ./.env
    volumes:
      - ./data.dev/django/staticfiles:/opt/devify/core/staticfiles
      - ./data.dev/logs/api:/var/log/gunicorn
      - ./devify:/opt/devify
      - ./data.dev/email_attachments:/opt/email_attachments
      - ./docker/nginx/certs:/opt/devify/docker/nginx/certs
    networks:
      - devify_network
    depends_on:
      mysql:
        condition: service_healthy
    command: development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  devify-worker:
    image: devify:latest
    container_name: devify-worker-dev
    restart: unless-stopped
    stop_grace_period: 60s
    env_file:
      - ./.env
    volumes:
      - ./cache.dev:/opt/cache
      - ./data.dev/logs/worker:/var/log/celery
      - ./devify:/opt/devify
      - ./data.dev/email_attachments:/opt/email_attachments
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery

  devify-scheduler:
    image: devify:latest
    container_name: devify-scheduler-dev
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - ./.env
    volumes:
      - ./data.dev/logs/scheduler:/var/log/celery
      - ./devify:/opt/devify
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery-beat

  mysql:
    image: mariadb:11.6
    container_name: devify-mariadb-dev
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./docker/mysql/etc/my.cnf:/etc/mysql/my.cnf
      - ./docker/mysql/initdb.d:/docker-entrypoint-initdb.d
      - ./docker/mysql/scripts:/opt/devify/scripts
      - ./data.dev/mysql/data:/var/lib/mysql
      - ./data.dev/logs/mysql:/var/log/mysql
    networks:
      - devify_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: devify-redis-dev
    restart: unless-stopped
    command: redis-server
    volumes:
      - ./data.dev/redis:/data
      - ./data.dev/logs/redis:/var/log/redis
    networks:
      - devify_network

  flower:
    image: devify:latest
    container_name: devify-flower-dev
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "${FLOWER_HOST_PORT:-5555}:5555"
    depends_on:
      devify-api:
        condition: service_started
      redis:
        condition: service_started
    command: flower
    networks:
      - devify_network

  devify-ui:
    image: devify-ui:dev
    build:
      context: ./ui
      dockerfile: Dockerfile.dev
    container_name: devify-ui-dev
    restart: unless-stopped
    volumes:
      - ./ui/src:/app/src:ro
      - ./ui/public:/app/public:ro
      - ./ui/index.html:/app/index.html:ro
      - ./ui/vite.config.js:/app/vite.config.js:ro
      - ./ui/tailwind.config.js:/app/tailwind.config.js:ro
      - ./ui/postcss.config.js:/app/postcss.config.js:ro
      - ./ui/package.json:/app/package.json:ro
      - ./ui/node_modules:/app/node_modules
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_started

  nginx:
    image: nginx:latest
    container_name: devify-nginx-dev
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf
      - ./data.dev/django/staticfiles:/staticfiles:ro
      - ./data.dev/email_attachments:/opt/email_attachments:ro
      - ./data.dev/logs/nginx:/var/log/nginx
    ports:
      - "${DJANGO_HOST_PORT:-8000}:80"
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_healthy
      devify-ui:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  devify_network:
    driver: bridge
