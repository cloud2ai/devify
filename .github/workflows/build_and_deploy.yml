name: Build and Deploy

on:
  push:
    tags:
      - 'v*'

# Serialize deploys: a queued release waits for a running one instead of
# racing it on the host (complements the deploy script's single-flight lock).
concurrency:
  group: devify-deploy
  cancel-in-progress: false

env:
  REGISTRY: ${{ vars.REGISTRY }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  UI_IMAGE_NAME: devify-ui
  VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
  VITE_EMAIL_DOMAIN: ${{ vars.VITE_EMAIL_DOMAIN }}
  VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
  VITE_SENTRY_ENVIRONMENT: ${{ vars.VITE_SENTRY_ENVIRONMENT }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata for backend image
        id: backend-meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          build-args: |
            USE_MIRROR=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for UI image
        id: ui-meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.UI_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=semver,pattern=latest

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile
          push: true
          tags: ${{ steps.ui-meta.outputs.tags }}
          labels: ${{ steps.ui-meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_EMAIL_DOMAIN=${{ env.VITE_EMAIL_DOMAIN != '' && env.VITE_EMAIL_DOMAIN || 'devify.local' }}
            VITE_SENTRY_DSN=${{ env.VITE_SENTRY_DSN }}
            VITE_SENTRY_ENVIRONMENT=${{ env.VITE_SENTRY_ENVIRONMENT != '' && env.VITE_SENTRY_ENVIRONMENT || 'production' }}
            VITE_SENTRY_RELEASE=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # Auto-deploy gate: the image build/push above always runs on a tag, but
      # deploying to the host runs ONLY when the repo/environment variable
      # DEVIFY_AUTO_DEPLOY is "true". Leave it unset (or "false") to build the
      # release without touching production — e.g. during the blue/green
      # cutover, deploy manually in a maintenance window
      # (DEVIFY_REF=<tag> ./scripts/devify-deploy.sh upgrade) — then set it to
      # "true" for hands-off zero-downtime releases. Toggling it needs no
      # workflow edit, just a GitHub Variables change.
      - name: Install SSH Key
        if: ${{ vars.DEVIFY_AUTO_DEPLOY == 'true' }}
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}
          if_key_exists: fail

      - name: Deploy aimychats production
        if: ${{ vars.DEVIFY_AUTO_DEPLOY == 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.DEVIFY_DEPLOY_SSH_HOST }}
          username: ${{ vars.DEVIFY_DEPLOY_SSH_USER }}
          port: ${{ vars.DEVIFY_DEPLOY_SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd ~/devify-deploy
            DEVIFY_REF=${{ github.ref_name }} ./scripts/devify-deploy.sh upgrade
            docker system prune -f
