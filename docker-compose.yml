x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  devify-api:
    image: registry.cn-beijing.aliyuncs.com/cloud2ai/devify:latest
    container_name: devify-api
    restart: unless-stopped
    logging: *default-logging
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEV_MODE: "0"
        APT_MIRROR_URL: http://archive.ubuntu.com/ubuntu
        PIP_INDEX_URL: https://pypi.org/simple
        PIP_TRUSTED_HOST: pypi.org
    env_file:
      - ${DEVIFY_ENV_FILE:-./.env}
    volumes:
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/django/staticfiles:/opt/devify/core/staticfiles
      - ${DEVIFY_RUNTIME_ROOT:-.}/cache:/opt/cache
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/api:/var/log/gunicorn
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/emails:/opt/haraka/emails
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/email_attachments:/opt/haraka/email_attachments
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/email_attachments:/opt/email_attachments
      - ${DEVIFY_NGINX_CERTS_DIR:-./docker/nginx/certs}:/opt/devify/docker/nginx/certs
    networks:
      - devify_network
    depends_on:
      mysql:
        condition: service_healthy
    command: gunicorn
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 60s

  devify-worker:
    image: registry.cn-beijing.aliyuncs.com/cloud2ai/devify:latest
    container_name: devify-worker
    restart: unless-stopped
    stop_grace_period: 60s
    logging: *default-logging
    env_file:
      - ${DEVIFY_ENV_FILE:-./.env}
    volumes:
      - ${DEVIFY_RUNTIME_ROOT:-.}/cache:/opt/cache
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/worker:/var/log/celery
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/emails:/opt/haraka/emails
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/email_attachments:/opt/haraka/email_attachments
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/email_attachments:/opt/email_attachments
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery

  devify-scheduler:
    image: registry.cn-beijing.aliyuncs.com/cloud2ai/devify:latest
    container_name: devify-scheduler
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    env_file:
      - ${DEVIFY_ENV_FILE:-./.env}
    volumes:
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/scheduler:/var/log/celery
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery-beat

  devify-ui:
    image: registry.cn-beijing.aliyuncs.com/cloud2ai/devify-ui:latest
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    container_name: devify-ui
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"
    networks:
      - devify_network
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -Y off --quiet --tries=1 --spider http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Recommend to use nginx proxy manager to manage the outside access
  nginx:
    image: nginx:latest
    container_name: devify-nginx
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ${DEVIFY_NGINX_CERTS_DIR:-./docker/nginx/certs}:/etc/nginx/certs:ro
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/django/staticfiles:/staticfiles:ro
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/email_attachments:/opt/email_attachments:ro
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/nginx:/var/log/nginx
    ports:
      - "${NGINX_HTTP_PORT:-10080}:80"
      - "${NGINX_HTTPS_PORT:-10443}:443"
      - "${NGINX_ADMIN_PORT:-19443}:9443"
    networks:
      - devify_network
    depends_on:
      devify-api:
        condition: service_healthy
      devify-ui:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mariadb:11.6
    container_name: devify-mariadb
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${DEVIFY_ENV_FILE:-./.env}
    volumes:
      - ./docker/mysql/etc/my.cnf:/etc/mysql/my.cnf
      - ./docker/mysql/initdb.d:/docker-entrypoint-initdb.d
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/mysql/data:/var/lib/mysql
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/mysql:/var/log/mysql
    networks:
      - devify_network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: devify-redis
    restart: unless-stopped
    logging: *default-logging
    command: redis-server
    volumes:
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/redis:/data
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/logs/redis:/var/log/redis
    networks:
      - devify_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  haraka:
    image: instrumentisto/haraka:latest
    container_name: devify-haraka
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ${DEVIFY_ENV_FILE:-./.env}
    environment:
      - APK_INSTALL_PACKAGES=openssl
    ports:
      - "${HARAKA_SMTP_PORT:-25}:25"
    volumes:
      - ./docker/haraka/config/plugins.prod:/etc/haraka/config/plugins:ro
      - ./docker/haraka/config/redis.ini:/etc/haraka/config/redis.ini:ro
      - ./docker/haraka/config/host_list.prod:/etc/haraka/config/host_list:ro
      - ./docker/haraka/config/tls.ini:/etc/haraka/config/tls.ini:ro
      - ./docker/haraka/plugins/raw_email_saver.js:/etc/haraka/plugins/raw_email_saver.js:ro
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/logs:/var/log/haraka
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/emails:/opt/haraka/emails
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/debug:/tmp/haraka_debug
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/haraka/email_attachments:/opt/haraka/email_attachments
      - ${DEVIFY_RUNTIME_ROOT:-.}/data/certs/haraka:/etc/haraka/certs:ro
    networks:
      - devify_network
    depends_on:
      - redis

networks:
  devify_network:
    driver: bridge
