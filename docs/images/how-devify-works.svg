<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Panel 1: Information Sources -->
  <rect x="20" y="20" width="320" height="360" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="180" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#9a3412">📥 Information Sources</text>

  <rect x="44" y="84" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="112" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">💬 Chat records</text>

  <rect x="44" y="156" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="184" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📧 Email threads</text>

  <rect x="44" y="228" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="256" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">🖼️ Screenshots</text>

  <rect x="44" y="300" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="328" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📝 Notes &amp; meetings</text>

  <!-- Arrow 1 -->
  <line x1="346" y1="200" x2="386" y2="200" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Panel 2: LLM Processing -->
  <rect x="400" y="20" width="320" height="360" rx="16" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="560" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#1e40af">🧠 LLM Processing</text>

  <rect x="424" y="92" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">🎯 Image &amp; intent recognition</text>

  <rect x="424" y="180" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="212" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">✍️ Text understanding</text>

  <rect x="424" y="268" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="300" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📋 Structured summarization</text>

  <!-- Arrow 2 -->
  <line x1="726" y1="200" x2="766" y2="200" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Panel 3: Data Applications -->
  <rect x="780" y="20" width="320" height="360" rx="16" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
  <text x="940" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">🚀 Data Applications</text>

  <rect x="804" y="88" width="272" height="56" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="116" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">✅ TODO management</text>

  <rect x="804" y="168" width="272" height="72" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="195" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📨 Delivery hub</text>
  <text x="940" y="217" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#6b7280">JIRA · Knowledge base · Webhooks</text>

  <rect x="804" y="264" width="272" height="72" rx="10" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="940" y="291" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#6b7280">✨ More apps coming</text>
  <text x="940" y="313" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#9ca3af">extensible by design</text>
</svg>
