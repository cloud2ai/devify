<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 400" font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- 面板 1：信息源 -->
  <rect x="20" y="20" width="320" height="360" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="2"/>
  <text x="180" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#9a3412">📥 信息源</text>

  <rect x="44" y="84" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="112" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">💬 聊天记录</text>

  <rect x="44" y="156" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="184" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📧 邮件往来</text>

  <rect x="44" y="228" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="256" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">🖼️ 截图</text>

  <rect x="44" y="300" width="272" height="56" rx="10" fill="#ffffff" stroke="#fdba74" stroke-width="1.5"/>
  <text x="180" y="328" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📝 笔记与会议</text>

  <!-- 箭头 1 -->
  <line x1="346" y1="200" x2="386" y2="200" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 面板 2：LLM 处理 -->
  <rect x="400" y="20" width="320" height="360" rx="16" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
  <text x="560" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#1e40af">🧠 LLM 处理</text>

  <rect x="424" y="92" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="124" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">🎯 图像与意图识别</text>

  <rect x="424" y="180" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="212" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">✍️ 文本理解</text>

  <rect x="424" y="268" width="272" height="64" rx="10" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="560" y="300" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📋 结构化总结</text>

  <!-- 箭头 2 -->
  <line x1="726" y1="200" x2="766" y2="200" stroke="#94a3b8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- 面板 3：数据应用 -->
  <rect x="780" y="20" width="320" height="360" rx="16" fill="#f0fdf4" stroke="#4ade80" stroke-width="2"/>
  <text x="940" y="58" text-anchor="middle" font-size="19" font-weight="700" fill="#166534">🚀 数据应用</text>

  <rect x="804" y="88" width="272" height="56" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="116" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">✅ TODO 管理</text>

  <rect x="804" y="168" width="272" height="72" rx="10" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="940" y="195" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#1f2937">📨 投递中心</text>
  <text x="940" y="217" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#6b7280">JIRA · 知识库 · Webhook</text>

  <rect x="804" y="264" width="272" height="72" rx="10" fill="#ffffff" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="940" y="291" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#6b7280">✨ 更多应用</text>
  <text x="940" y="313" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#9ca3af">持续扩展中</text>
</svg>
